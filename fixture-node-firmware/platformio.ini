[platformio]
default_envs = esp32_eth_dev

[env:esp32_eth_dev]
platform = espressif32
framework = arduino
board = wt32-eth01
; Web UI assets in data/ are packed into LittleFS. Upload after edits:
;   pio run -e esp32_eth_dev -t uploadfs
board_build.filesystem = littlefs
board_build.partitions = partitions_sightline.csv
monitor_speed = 115200
build_flags =
  -I include
  ; Workaround for ETH.h -> WiFi.h include resolution on this toolchain/package set.
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFi/src
lib_ldf_mode = deep+
lib_deps =
  bblanchon/ArduinoJson
  mathieucarbou/ESPAsyncWebServer
  ; ESPAsyncWebServer already pulls AsyncTCP; keep single source to avoid dupes.
