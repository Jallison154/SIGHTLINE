<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIGHTLINE Fixture Node</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="card">
    <h1>SIGHTLINE Fixture Node</h1>
    <p class="sub">Configure network + Art-Net + DMX output.</p>

    <section>
      <h2>Configuration</h2>
      <label>Node name <input id="nodeName" maxlength="32" /></label>
      <label>Fixture label (optional) <input id="fixtureLabel" maxlength="64" /></label>
      <label>Art-Net universe <input id="universe" type="number" min="0" max="32767" /></label>
      <label>DMX start address <input id="dmxStartAddress" type="number" min="1" max="512" /></label>

      <label>IP mode
        <select id="ipMode">
          <option value="dhcp">DHCP</option>
          <option value="static">Static</option>
        </select>
      </label>

      <div id="staticGroup">
        <label>Static IP <input id="staticIp" inputmode="numeric" /></label>
        <label>Subnet mask <input id="subnetMask" inputmode="numeric" /></label>
        <label>Gateway <input id="gateway" inputmode="numeric" /></label>
      </div>

      <div class="buttons">
        <button id="saveBtn" type="button">Save</button>
        <button id="applyBtn" type="button">Save + Apply</button>
      </div>
      <p id="message"></p>
    </section>

    <section>
      <h2>Signal status</h2>
      <div class="status-grid">
        <div>Signal</div><div id="sigState">-</div>
        <div>Universe</div><div id="sigUniverse">-</div>
        <div>Frame interval</div><div id="sigInterval">-</div>
        <div>Packets accepted</div><div id="sigAccepted">-</div>
        <div>Packets ignored</div><div id="sigIgnored">-</div>
        <div>Packets bad</div><div id="sigBad">-</div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
