[platformio]
default_envs = ground_controller_dev
description = SIGHTLINE NextGen networked multi-device scaffold

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
build_flags =
  -D CORE_DEBUG_LEVEL=1

[env:ground_controller_dev]
board = wt32-eth01
; Controller test/service UI assets: apps/ground-controller/data/
; Upload with: pio run -e ground_controller_dev -t uploadfs
board_build.filesystem = littlefs
data_dir = apps/ground-controller/data
build_src_filter = +<apps/ground-controller/src/> +<shared/**>
build_flags =
  ${env.build_flags}
  -I apps/ground-controller/include
  -I shared/protocol/include
lib_deps =
  bblanchon/ArduinoJson

[env:fixture_node_dev]
board = wt32-eth01
; Web UI + logo: apps/fixture-node/data/ — upload with: pio run -e fixture_node_dev -t uploadfs
board_build.filesystem = littlefs
data_dir = apps/fixture-node/data
build_src_filter = +<apps/fixture-node/src/> +<shared/**>
build_flags =
  ${env.build_flags}
  -I apps/fixture-node/include
  -I shared/protocol/include
lib_deps =
  bblanchon/ArduinoJson
  mathieucarbou/ESPAsyncWebServer
  me-no-dev/AsyncTCP
