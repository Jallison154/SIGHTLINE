<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIGHTLINE Controller</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>SIGHTLINE Controller</h1>
        <p class="sub">Test Control + Setup / Service Interface</p>
      </header>

      <section>
        <h2>Target + Ownership</h2>
        <label>Active target node
          <select id="targetNode"></select>
        </label>
        <div class="buttons">
          <button id="refreshTargetsBtn" type="button">Refresh Targets</button>
          <button id="selectTargetBtn" type="button">Set Active Target</button>
        </div>
        <div class="buttons">
          <button id="claimBtn" type="button">Claim</button>
          <button id="releaseBtn" type="button">Release</button>
        </div>
      </section>

      <section class="test-control">
        <h2>Test Control</h2>
        <label>Input Mode
          <select id="inputMode">
            <option value="live_mixed">Live Mixed</option>
            <option value="web_override">Web Override</option>
            <option value="monitor_only">Monitor Only</option>
          </select>
        </label>

        <label>Pan <input id="pan" type="range" min="0" max="1" step="0.001" /><span id="panVal"></span><span id="panSrc" class="src-tag">src:-</span></label>
        <label>Tilt <input id="tilt" type="range" min="0" max="1" step="0.001" /><span id="tiltVal"></span><span id="tiltSrc" class="src-tag">src:-</span></label>
        <label>Intensity <input id="intensity" type="range" min="0" max="255" step="1" /><span id="intensityVal"></span><span id="intensitySrc" class="src-tag">src:-</span></label>
        <label>Iris <input id="iris" type="range" min="0" max="255" step="1" /><span id="irisVal"></span><span id="irisSrc" class="src-tag">src:-</span></label>
        <label>Zoom <input id="zoom" type="range" min="0" max="255" step="1" /><span id="zoomVal"></span><span id="zoomSrc" class="src-tag">src:-</span></label>

        <div class="buttons">
          <button id="blackoutOnBtn" type="button">Blackout On</button>
          <button id="blackoutOffBtn" type="button">Blackout Off</button>
        </div>
        <div class="buttons">
          <button id="homeBtn" type="button">Reset/Home (Placeholder)</button>
          <button id="speedBtn" type="button">Speed/Sensitivity (Placeholder)</button>
        </div>
        <p id="controlMsg"></p>
      </section>

      <section>
        <h2>Live Status</h2>
        <div class="status-grid">
          <div>Controller ID</div><div id="stControllerId">-</div>
          <div>Network</div><div id="stNetwork">-</div>
          <div>Discovery</div><div id="stDiscovery">-</div>
          <div>Ownership</div><div id="stOwnership">-</div>
          <div>Control TX</div><div id="stControlTx">-</div>
          <div>Web Ready</div><div id="stWeb">-</div>
          <div>Owns Target</div><div id="stOwnsTarget">-</div>
          <div>Frames Sent</div><div id="stFramesSent">-</div>
          <div>Last Update Source</div><div id="stLastSource">-</div>
          <div>Uptime</div><div id="stUptime">-</div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
